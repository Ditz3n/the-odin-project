<!DOCTYPE html>
<html lang="en-US">
    <head>
        <link rel="stylesheet" type="text/css" href="./styles.css">
        <meta charset="8-UTF">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>The Odin Project - Etch A Sketch</title>
        <script src="./scripts.js" defer></script>
    </head>
    <body>
        <header>
            <h1>Etch A Sketch</h1>
            <p>Select a grid size and let the fun begin!</p>
        </header>
        <section>
            <div class="inner-section-container">
                <div class="grid-modify-buttons-container">
                    <button class="btn-one">Grid Size</button>
                    <div class="color-picker-container">
                        <input type="color" value="#000000">
                        <p class="color-hex-showcase">#000000</p>
                    </div>
                    <button class="btn-three">Pen</button>
                    <button class="btn-four">Rainbow Pen</button>
                    <button class="btn-five">Brush</button>
                    <button class="btn-six">Eraser</button>
                </div>
                <div class="grid-container-wrapper">
                    <div class="grid-container"></div>
                </div>
                <div class="the-odin-project-credit">
                    <p>A project as a part of <a href="https://www.theodinproject.com/lessons/foundations-etch-a-sketch">The Odin Project</a></p>
                </div>
            </div>
        </section>
        <footer>
            <p><a href="https://github.com/Ditz3n/the-odin-project">&copy; 2026 Mads Dittmann Villadsen. All rights reserved.</a></p>
        </footer>
    </body>
</html>
