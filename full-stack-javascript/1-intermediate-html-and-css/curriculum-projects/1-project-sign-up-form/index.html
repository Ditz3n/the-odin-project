<!DOCTYPE html>
<html lang="en-US">
    <head>
        <link rel="stylesheet" type="text/css" href="./styles.css">
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>The Odin Project - Project: Sign-Up Form</title>
    </head>
    <body>
        <div class="background-image">
            <img src="./images/background-image.png">
        </div>
        <div class="left-side-container">
            <div>
                <img src="./images/odin-lined.png">
                <p>Odin</p>
            </div>    
        </div>
        <div class="right-side-container">
            <div class="right-container-top">
                <div class="right-side-top-text">
                    <p>
                    This is not a real online service! You know you need something
                    like this in your life to help you realize your deepest dreams.
                    Sign up <em>now</em> to get started.
                    </p>
                    <p>You <em>know</em> you want to.</p>  
                </div>
            </div>
            <div class="right-container-middle">
                <form action="#" method="post">
                <div>
                   <legend>Let's do this!</legend>

                    <div>
                        <div>
                            <label for="first_name">First Name*</label>
                            <input id="first_name" type="text" name="first_name" placeholder="Frye" required
                            minlength="2">
                        </div>
                        <div>
                            <label for="last_name">Last Name*</label>
                            <input id="last_name" type="text" name="last_name" placeholder="Deepcut" required
                            minlength="2">
                        </div>
                    </div>
                    
                    <div>
                        <div>
                            <label for="email">Email*</label>
                            <input id="email" type="email" name="email" placeholder="frye@deepcut.jp" required>
                        </div>
                        <div>
                            <label for="phone_number">Phone</label>
                            <input id="phone_number" type="text" name="phone_number" placeholder="+81 00 00 00 00"
                            minlength="10">
                        </div>
                    </div>

                    <div>
                        <!-- Password Validation Regex: https://stackoverflow.com/a/27976676 --> 
                        <div>
                            <label for="password">Password*</label>
                            <input id="password" type="password" name="password" required
                            pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*[0-9])(?=.*[!@#$%^&*_=+-]).{8,12}$"
                            minlength="2">
                        </div>
                        <div>
                            <label for="confirm_pawword">Confirm Password*</label>
                            <input id="confirm_pawword" type="password" name="password" required
                            pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*[0-9])(?=.*[!@#$%^&*_=+-]).{8,12}$"
                            minlength="2">
                        </div>
                    </div> 
                </div>
            </div>
            <div class="right-container-bottom">
                <div>
                   <button type="submit">Create Account</button>
                    </form>
                    <div>
                        <p>Already have an account? <a href="#">Log in</a></p>   
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
