<!DOCTYPE html>
<html lang="en-US">
    <head>
        <link rel="stylesheet" type="text/css" href="./styles.css">
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>The Odin Project - Project: Tic Tac Toe</title>
        <script src="./scripts.js" defer></script>
    </head>
    <body>
        <header>

        </header>
        <section class="game-section">
            <h1 class="display-title">Tic Tac Toe</h1>
            <form class="setup-container">
                <div>
                    <label for="player-one">Player 1</label>
                    <input id="player-one" type="text" name="player_one" placeholder="John Doe" minlength="2" required>
                </div>
                <div>
                    <label for="player-two">Player 2</label>
                    <input id="player-two" type="text" name="player_two" placeholder="Jane Doe" minlength="2" required>
                </div>
                <button id="start-btn" type="submit">Start Game</button>
            </form>
            <p class="display-instructions"></p>
        </section>
        <footer>
            <p>&copy; 2026 Mads Dittmann Villadsen. All Rights Reserved.</p>
        </footer>
    </body>
</html>
